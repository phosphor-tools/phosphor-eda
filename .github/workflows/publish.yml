name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distributions
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          cache-suffix: release

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PROJECT_VERSION=$(uv version --short)
          if [ "$RELEASE_TAG" != "v$PROJECT_VERSION" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match project version v$PROJECT_VERSION"
            exit 1
          fi

      - name: Verify release tag is on main
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERIFIER="$RUNNER_TEMP/verify-release-tag-on-main.sh"
          git show origin/main:.github/scripts/verify-release-tag-on-main.sh > "$VERIFIER"
          bash "$VERIFIER" "$RELEASE_TAG" origin/main

      - run: uv sync --locked
      - name: Build distributions
        run: uv build --no-sources
      - name: Check distribution metadata
        run: uv run --locked twine check --strict dist/*
      - name: Smoke-test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/package_smoke.py
      - name: Smoke-test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/package_smoke.py

      - name: Store distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions
    needs: build
    runs-on: depot-ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/phosphor-eda/
    permissions:
      id-token: write
    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
