name: Setup Python
description: Install uv, restore the interpreter-specific cache, and sync dependencies

inputs:
  python-version:
    description: Python version to install and use
    required: true
  save-cache:
    description: Save the uv cache when this job finishes
    default: "false"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.21"
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-python: true
        cache-suffix: python-${{ inputs.python-version }}-v1
        prune-cache: false
        save-cache: ${{ inputs.save-cache }}

    - name: Sync dependencies
      shell: bash
      run: uv sync --locked --python ${{ inputs.python-version }}
